<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberSlash — Questionnaire Dev Web</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --card: #0f1419;
    --border: #1a2a1a;
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.12);
    --green-faint: rgba(0,255,136,0.04);
    --text: #d0e8d0;
    --muted: #4a6a4a;
    --blue: #00ccff;
    --orange: #ff9500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Oxanium', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,100,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,100,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.25; }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 660px; }
  .header { text-align: center; margin-bottom: 36px; }
  .header-logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
  .header-logo span { color: var(--green); }
  .header-sub { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 3px; }
  .progress-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .progress-track { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 2px; transition: width 0.5s ease; }
  .progress-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 44px 40px;
    position: relative;
    animation: slideUp 0.35s ease both;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), transparent);
    border-radius: 12px 12px 0 0;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-number { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green); letter-spacing: 3px; margin-bottom: 14px; opacity: 0.6; }
  .q-text { font-size: clamp(17px, 3.5vw, 22px); font-weight: 600; color: #fff; line-height: 1.4; margin-bottom: 6px; }
  .q-hint { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 28px; letter-spacing: 1px; }
  .info-box {
    background: rgba(0,204,255,0.06);
    border: 1px solid rgba(0,204,255,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #7ab8cc;
    line-height: 1.7;
  }
  .info-box.orange {
    background: rgba(255,149,0,0.06);
    border-color: rgba(255,149,0,0.2);
    color: #cc9a4a;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text);
    text-align: left;
    font-family: 'Oxanium', sans-serif;
    font-size: 14px;
    width: 100%;
  }
  .option:hover { border-color: rgba(0,255,136,0.4); background: var(--green-faint); transform: translateX(3px); }
  .option.selected { border-color: var(--green); background: var(--green-dim); color: #fff; }
  .option-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px; padding: 2px 6px;
    flex-shrink: 0; transition: all 0.2s;
  }
  .option.selected .option-key { border-color: var(--green); color: var(--green); }
  .option-check {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-left: auto;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold;
    transition: all 0.2s;
    color: transparent;
  }
  .option.selected .option-check { background: var(--green); border-color: var(--green); color: #000; }
  .text-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: #fff;
    font-family: 'Oxanium', sans-serif;
    font-size: 17px;
    padding: 12px 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-bottom-color: var(--green); }
  .text-input::placeholder { color: var(--muted); font-size: 14px; }
  textarea.text-input {
    resize: none; min-height: 90px;
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    margin-top: 4px; font-size: 14px;
  }
  textarea.text-input:focus { border-color: var(--green); }
  .nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; }
  .btn-back {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--muted); background: none; border: none;
    cursor: pointer; letter-spacing: 2px; transition: color 0.2s; padding: 8px 0;
  }
  .btn-back:hover { color: var(--text); }
  .btn-back:disabled { opacity: 0; pointer-events: none; }
  .btn-next {
    display: flex; align-items: center; gap: 10px;
    background: var(--green); color: #000;
    border: none; border-radius: 6px;
    padding: 12px 24px;
    font-family: 'Oxanium', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-next:hover { background: #00ffaa; transform: translateX(2px); }
  .btn-hint { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 6px; text-align: right; letter-spacing: 1px; }
  .success {
    text-align: center; padding: 50px 40px;
    background: var(--card);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 12px;
    animation: slideUp 0.5s ease both;
  }
  .success-icon { font-size: 44px; margin-bottom: 16px; }
  .success h2 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 10px; }
  .success p { color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 12px; line-height: 1.8; margin-bottom: 24px; }
  .success-summary {
    background: var(--green-faint);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
    text-align: left; margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text);
    line-height: 2; max-height: 220px; overflow-y: auto;
  }
  .success-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-pdf {
    background: var(--green); color: #000;
    border: none; border-radius: 6px;
    padding: 13px 28px;
    font-family: 'Oxanium', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-pdf:hover { background: #00ffaa; }
  .btn-copy {
    background: transparent; color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 6px; padding: 13px 24px;
    font-family: 'Oxanium', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-copy:hover { border-color: var(--green); }
  .btn-restart {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 13px 24px;
    font-family: 'Oxanium', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--green); color: var(--green); }
  .mail-hint { margin-top: 20px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 1px; line-height: 1.8; }
  .mail-cta-btn {
    display: inline-block;
    margin-top: 10px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .mail-cta-btn:hover { background: var(--green); color: #000; }
  @media (max-width: 500px) {
    .question-card { padding: 32px 22px; }
    .success { padding: 36px 22px; }
  }
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="wrap">
  <div class="header">
    <div class="header-logo">Cyber<span>Slash</span></div>
    <div class="header-sub">// QUESTIONNAIRE DÉVELOPPEMENT WEB</div>
  </div>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 13</div>
  </div>
  <div id="question-area"></div>
</div>

<script>
const TOTAL = 13;
const EMAIL_CONTACT = 'ash-advisory@proton.me';
const keys = 'ABCDEFGHIJKLMNOPQRST';

const questions = [
  { id:'nom', text:'Quel est votre nom ou le nom de votre entreprise ?', hint:'Pour personnaliser votre récapitulatif PDF', type:'text', placeholder:'Ex: Marie Dupont ou Boulangerie Martin' },
  { id:'type', text:'Quel type de site vous faut-il ?', hint:'Choisissez une option', type:'single', options:['Site vitrine (présentation entreprise / activité)','Portfolio (artiste, photographe, freelance)','Site e-commerce (boutique en ligne)','Application web sur mesure','Refonte d\'un site existant','Je ne sais pas encore'] },
  { id:'existant', text:'Avez-vous déjà un site existant ?', hint:'Choisissez une option', type:'single', options:['Non, création from scratch','Oui, refonte complète','Oui, améliorations ciblées seulement','J\'ai un nom de domaine mais pas de site'] },
  { id:'pages', text:'Combien de pages souhaitez-vous environ ?', hint:'Estimation, peut évoluer', type:'single', options:['1 page (one-page / landing)','2 à 5 pages','6 à 15 pages','15+ pages','Je ne sais pas'] },
  { id:'fonctionnalites', text:'Quelles fonctionnalités souhaitez-vous ?', hint:'Plusieurs choix possibles', type:'multi', options:['Formulaire de contact','Blog / actualités','Galerie photos / portfolio','Paiement en ligne','Espace membre / connexion','Réservation en ligne','Carte interactive','Multilingue','Animations / effets visuels poussés','Aucune fonctionnalité particulière'] },
  { id:'cms', text:'Voulez-vous modifier votre site vous-même ?', hint:'Choisissez une option', type:'single', options:['Oui, je veux un CMS (WordPress, etc.)','Oui, juste textes et images','Non, je vous confie les mises à jour','Je ne sais pas ce qu\'est un CMS'] },
  { id:'design_existant', text:'Avez-vous déjà des éléments de design ?', hint:'Choisissez une option', type:'single', options:['Oui, logo + charte graphique complète','Oui, juste un logo','Non, tout est à créer','J\'ai des références / inspirations à partager'] },
  {
    id:'da_maquette',
    text:'Souhaitez-vous fournir une maquette ou un croquis ?',
    hint:'Dessin main levée, photo, Paint, Figma... tout est accepté',
    type:'single',
    infoBox:'<strong>ℹ️ Info :</strong> 2 propositions de maquettes gratuites sont incluses dans chaque prestation. Au-delà, chaque maquette supplémentaire est facturée séparément. Si vous fournissez votre propre maquette, ce quota ne s\'applique pas.',
    infoType:'blue',
    options:['Oui, je vais vous envoyer un croquis / maquette','Non — carte blanche, je fais confiance à votre créativité','Je veux voir vos propositions (2 gratuites incluses)','J\'ai des sites de référence à vous montrer']
  },
  { id:'style', text:'Quel style visuel correspond à votre image ?', hint:'Plusieurs choix possibles', type:'multi', options:['Minimaliste & épuré','Moderne & dynamique','Sombre & premium','Clair & professionnel','Coloré & créatif','Vintage / rétro','Technique / high-tech','Je m\'en remets entièrement à vous'] },
  { id:'couleurs', text:'Avez-vous des couleurs imposées ou préférées ?', hint:'Codes hex, noms ou description libre', type:'text', placeholder:'Ex: bleu marine et or, #1a2a3a, ou aucune préférence' },
  {
    id:'budget',
    text:'Quel est votre budget approximatif ?',
    hint:'Indicatif, sans engagement',
    type:'single',
    infoBox:'<strong>💡 Rappel :</strong> Le tarif varie selon la complexité et les fonctionnalités. Un devis personnalisé vous sera envoyé après étude du projet.',
    infoType:'orange',
    options:['Moins de 200€','200€ à 500€','500€ à 1 000€','1 000€ à 2 000€','Plus de 2 000€','À définir ensemble']
  },
  { id:'delai', text:'Dans quel délai souhaitez-vous le site livré ?', hint:'Choisissez une option', type:'single', options:['Urgent (moins de 1 semaine)','Dans les 2 semaines','Dans le mois','Dans 2 à 3 mois','Pas de délai particulier'] },
  { id:'infos', text:'Informations complémentaires ?', hint:'Activité, attentes, contraintes techniques, liens de référence...', type:'textarea', placeholder:'Ex: Je suis boulanger à Rouen, je veux un site simple avec mes horaires et un formulaire de commande...' }
];

let current = 0, answers = {};

function updateProgress() {
  const pct = Math.round((current / TOTAL) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = current + ' / ' + TOTAL;
}

function render() {
  const area = document.getElementById('question-area');
  if (current >= questions.length) { showSuccess(); return; }
  const q = questions[current];
  updateProgress();
  let inputHtml = '';
  const infoHtml = q.infoBox ? `<div class="info-box ${q.infoType === 'orange' ? 'orange' : ''}">${q.infoBox}</div>` : '';

  if (q.type === 'single') {
    inputHtml = infoHtml + '<div class="options">' +
      q.options.map((o, i) => `<button class="option ${answers[q.id]===o?'selected':''}" onclick="selectSingle(this,'${q.id}',${i})"><span class="option-key">${keys[i]}</span>${o}</button>`).join('') + '</div>';
  } else if (q.type === 'multi') {
    const sel = answers[q.id] || [];
    inputHtml = infoHtml + '<div class="options multi">' +
      q.options.map((o, i) => `<button class="option ${sel.includes(o)?'selected':''}" onclick="selectMulti(this,'${q.id}',${i})"><span class="option-key">${keys[i]}</span>${o}<span class="option-check">${sel.includes(o)?'✓':''}</span></button>`).join('') + '</div>';
  } else if (q.type === 'textarea') {
    inputHtml = `<textarea class="text-input" id="text-val" rows="4" placeholder="${q.placeholder||''}">${answers[q.id]||''}</textarea>`;
  } else {
    inputHtml = `<input type="text" class="text-input" id="text-val" placeholder="${q.placeholder||''}" value="${answers[q.id]||''}">`;
  }

  area.innerHTML = `<div class="question-card">
    <div class="q-number">// QUESTION ${current+1} SUR ${TOTAL}</div>
    <div class="q-text">${q.text}</div>
    <div class="q-hint">${q.hint||''}</div>
    ${inputHtml}
    <div class="nav-btns">
      <button class="btn-back" onclick="goBack()" ${current===0?'disabled':''}>← RETOUR</button>
      <div>
        <button class="btn-next" onclick="goNext()">${current===questions.length-1?'TERMINER ✓':'SUIVANT →'}</button>
        <div class="btn-hint">${q.type==='multi'?'Plusieurs choix — cliquez Suivant quand c\'est bon':q.type==='single'?'Sélection automatique':'Tapez puis Suivant'}</div>
      </div>
    </div>
  </div>`;
}

function selectSingle(btn, id, idx) {
  answers[id] = questions.find(q=>q.id===id).options[idx];
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(goNext, 280);
}

function selectMulti(btn, id, idx) {
  const val = questions.find(q=>q.id===id).options[idx];
  if (!answers[id]) answers[id] = [];
  const i = answers[id].indexOf(val);
  if (i > -1) { answers[id].splice(i,1); btn.classList.remove('selected'); btn.querySelector('.option-check').textContent=''; }
  else { answers[id].push(val); btn.classList.add('selected'); btn.querySelector('.option-check').textContent='✓'; }
}

function goNext() {
  const q = questions[current];
  if ((q.type==='text'||q.type==='textarea') && document.getElementById('text-val')) {
    answers[q.id] = document.getElementById('text-val').value;
  }
  current++; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack() { if (current>0) { current--; render(); } }

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const W=210, H=297;
  let y=0;

  doc.setFillColor(8,12,16); doc.rect(0,0,W,H,'F');
  doc.setFillColor(10,18,14); doc.rect(0,0,W,40,'F');
  doc.setFillColor(0,255,136); doc.rect(0,0,W,2,'F');

  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.setTextColor(0,255,136); doc.text('CyberSlash',20,18);
  doc.setTextColor(255,255,255); doc.text(' Solutions',20+doc.getTextWidth('CyberSlash'),18);

  doc.setFont('courier','normal'); doc.setFontSize(8);
  doc.setTextColor(74,106,74); doc.text('// QUESTIONNAIRE DÉVELOPPEMENT WEB',20,28);

  const date = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  doc.text('Généré le '+date, W-20, 28, {align:'right'});
  if (answers['nom']) { doc.setTextColor(200,230,210); doc.setFontSize(9); doc.text('Client : '+answers['nom'], W-20, 18, {align:'right'}); }

  y=52;
  questions.forEach((q,i) => {
    if (!answers[q.id]) return;
    const val = Array.isArray(answers[q.id]) ? answers[q.id] : [answers[q.id]];
    if (y > H-40) { doc.addPage(); doc.setFillColor(8,12,16); doc.rect(0,0,W,H,'F'); y=20; }

    doc.setFont('courier','bold'); doc.setFontSize(8); doc.setTextColor(0,255,136);
    doc.text('Q'+(i+1)+'.', 20, y);
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
    const qLines = doc.splitTextToSize(q.text, W-50);
    doc.text(qLines, 30, y); y += qLines.length*5+4;

    val.forEach(v => {
      if (!v||!v.trim()) return;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(200,230,210);
      const aLines = doc.splitTextToSize('→  '+v, W-50);
      doc.text(aLines, 32, y); y += aLines.length*5+2;
    });

    doc.setDrawColor(30,50,35); doc.setLineWidth(0.3);
    doc.line(20, y+2, W-20, y+2); y+=10;
  });

  doc.setFillColor(10,18,14); doc.rect(0,H-18,W,18,'F');
  doc.setFillColor(0,255,136); doc.rect(0,H-18,W,1,'F');
  doc.setFont('courier','normal'); doc.setFontSize(8); doc.setTextColor(74,106,74);
  doc.text('cyberslash.fr  |  '+EMAIL_CONTACT, 20, H-8);
  doc.text('CyberSlash Solutions © '+new Date().getFullYear(), W-20, H-8, {align:'right'});

  const name = answers['nom'] ? answers['nom'].replace(/\s+/g,'_') : 'client';
  doc.save('CyberSlash_DevWeb_'+name+'.pdf');
}

function copySummary() {
  let text = '=== QUESTIONNAIRE DEV WEB — CYBERSLASH SOLUTIONS ===\n\n';
  questions.forEach(q => {
    if (answers[q.id]) {
      const val = Array.isArray(answers[q.id]) ? answers[q.id].join(', ') : answers[q.id];
      text += '▶ '+q.text+'\n   → '+val+'\n\n';
    }
  });
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent='✓ Copié !';
    setTimeout(()=>btn.textContent='📋 Copier le texte',2000);
  });
}

function showSuccess() {
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-label').textContent=TOTAL+' / '+TOTAL;
  let summaryHtml='';
  questions.forEach(q => {
    if (answers[q.id]) {
      const val = Array.isArray(answers[q.id]) ? answers[q.id].join(', ') : answers[q.id];
      summaryHtml += `<span style="color:#00ff88">▶ ${q.text}</span><br>&nbsp;&nbsp;→ ${val}<br><br>`;
    }
  });
  document.getElementById('question-area').innerHTML = `
    <div class="success">
      <div class="success-icon">✅</div>
      <h2>Merci pour vos réponses !</h2>
      <p>// Téléchargez le PDF et envoyez-le à ${EMAIL_CONTACT}<br>Je vous recontacte sous 24h pour discuter de votre projet.</p>
      <div class="success-summary">${summaryHtml}</div>
      <div class="success-btns">
        <button class="btn-pdf" onclick="downloadPDF()">⬇ Télécharger le PDF</button>
        <button class="btn-copy" id="btn-copy" onclick="copySummary()">📋 Copier le texte</button>
        <button class="btn-restart" onclick="restart()">Recommencer</button>
      </div>
      <div class="mail-hint">Envoyez le PDF à l'adresse mail depuis laquelle vous avez reçu ce questionnaire</div>
      <a class="mail-cta-btn" href="mailto:${EMAIL_CONTACT}">${EMAIL_CONTACT}</a>
    </div>`;
}

function restart() { current=0; answers={}; render(); }

(function() {
  const canvas=document.getElementById('rain');
  const ctx=canvas.getContext('2d');
  const chars='01アイウエオ<>{}|/\\#$%&';
  let cols,drops;
  function resize() {
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    cols=Math.floor(canvas.width/18);
    drops=new Array(cols).fill(0).map(()=>Math.random()*-50);
  }
  resize(); window.addEventListener('resize',resize);
  function draw() {
    ctx.fillStyle='rgba(8,12,16,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font='12px monospace'; ctx.fillStyle='#00ff88';
    for(let i=0;i<drops.length;i++){
      const y=drops[i]*18;
      if(y>0) ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*18,y);
      if(y>canvas.height&&Math.random()>0.975) drops[i]=-Math.random()*20;
      drops[i]++;
    }
  }
  setInterval(draw,60);
})();

render();
</script>
</body>
</html>
